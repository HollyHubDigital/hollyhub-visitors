<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Reset your Holly account password securely. Enter your email to receive a reset link and create a new password." />
  <meta name="keywords" content="reset password, forgot password, account recovery" />
  <meta name="robots" content="noindex, follow" />
  <!-- Open Graph Tags -->
  <meta property="og:title" content="Reset Password - Holly" />
  <meta property="og:description" content="Securely reset your Holly account password." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://hollyhubdigitals.vercel.app/reset.html" />
  <meta property="og:image" content="https://hollyhubdigitals.vercel.app/Holly-og.png" />
  <!-- Canonical URL -->
  <meta property="canonical" content="https://hollyhubdigitals.vercel.app/reset.html" />
  <title>Reset Password - Holly</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="holly-favicon.png" type="image/png" />
  <link rel="apple-touch-icon" href="holly-favicon.png" />
</head>
<body>
  <header style="padding:1rem;display:flex;align-items:center;gap:1rem;">
    <a href="/" style="display:flex;align-items:center;gap:0.5rem;text-decoration:none;color:inherit;"><img src="https://cdn.jsdelivr.net/gh/HollyHubDigital/hollyhub-visitors@main/public/assets/hollyhub.jpg" alt="Holly" style="height:40px;border-radius:6px;"/><h1 style="font-size:1.2rem;margin:0">HOLLY<span style="color:#3b82f6">DEV</span></h1></a>
    <div style="margin-left:auto;display:flex;align-items:center;gap:1rem;">
      <select id="languageSelect" class="language-select" aria-label="Select language" style="display:none;">
        <option value="en">English</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="zh-CN">中文 (简体)</option>
        <option value="zh-TW">中文 (繁體)</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
        <option value="ru">Русский</option>
        <option value="pt">Português</option>
        <option value="it">Italiano</option>
        <option value="nl">Nederlands</option>
        <option value="sv">Svenska</option>
        <option value="no">Norsk</option>
        <option value="da">Dansk</option>
        <option value="fi">Suomi</option>
        <option value="pl">Polski</option>
        <option value="tr">Türkçe</option>
        <option value="ar">العربية</option>
        <option value="hi">हिन्दी</option>
        <option value="bn">বাংলা</option>
        <option value="pa">ਪੰਜਾਬੀ</option>
        <option value="ur">اردو</option>
        <option value="vi">Tiếng Việt</option>
        <option value="th">ไทย</option>
        <option value="id">Bahasa Indonesia</option>
        <option value="ms">Bahasa Melayu</option>
        <option value="he">עברית</option>
        <option value="el">Ελληνικά</option>
        <option value="ro">Română</option>
        <option value="hu">Magyar</option>
        <option value="cs">Čeština</option>
        <option value="sk">Slovenčina</option>
        <option value="bg">Български</option>
        <option value="uk">Українська</option>
        <option value="hr">Hrvatski</option>
        <option value="sr">Српски</option>
        <option value="sl">Slovenščina</option>
        <option value="lt">Lietuvių</option>
        <option value="lv">Latviešu</option>
        <option value="et">Eesti</option>
        <option value="mk">Македонски</option>
        <option value="sq">Shqip</option>
        <option value="az">Azərbaycan</option>
        <option value="hy">Հայերեն</option>
        <option value="ka">ქართული</option>
        <option value="mn">Монгол</option>
      </select>
      <div id="google_translate_element" style="display:none"></div>
    </div>
  </header>
  <main style="max-width:520px;margin:4rem auto;padding:1rem;">
    <h2>Choose a new password</h2>
    <form id="resetForm">
      <input type="password" id="newPassword" placeholder="New password" style="width:100%;padding:0.6rem;margin-bottom:0.6rem;border:1px solid #ddd;border-radius:6px;" required />
      <input type="password" id="confirmPassword" placeholder="Confirm new password" style="width:100%;padding:0.6rem;margin-bottom:0.6rem;border:1px solid #ddd;border-radius:6px;" required />
      <input type="hidden" id="resetToken" />
      <div style="display:flex;gap:0.5rem;justify-content:flex-end;">
        <button type="submit" class="btn btn-primary">Save new password</button>
      </div>
      <div id="resetMsg" style="margin-top:0.8rem;opacity:0.9;"></div>
    </form>
  </main>
  <script>
    // parse token from query
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';
    document.getElementById('resetToken').value = token;

    document.getElementById('resetForm').addEventListener('submit', async function(e){
      e.preventDefault();
      const np = document.getElementById('newPassword').value;
      const cp = document.getElementById('confirmPassword').value;
      if(np !== cp){ document.getElementById('resetMsg').innerText = 'Passwords do not match'; return; }
      if(!token){ document.getElementById('resetMsg').innerText = 'Invalid token'; return; }
      try{
        const r = await fetch('/api/auth/reset', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ token, newPassword: np }) });
        const j = await r.json();
        if(!r.ok) return document.getElementById('resetMsg').innerText = (j && j.error) ? j.error : 'Reset failed';
        document.getElementById('resetMsg').innerText = 'Password updated — redirecting to login...';
        setTimeout(()=>{ window.location.href = '/login.html'; }, 1200);
      }catch(e){ document.getElementById('resetMsg').innerText = 'Request failed'; }
    });
  </script>
  <script src="script.js"></script>
</body>
</html>
