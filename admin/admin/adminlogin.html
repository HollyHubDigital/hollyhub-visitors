<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Login - Holly</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    .login-wrap { max-width: 420px; margin: 8vh auto; padding: 2rem; border-radius: 12px; border: 1px solid var(--border-color); background: rgba(255,255,255,0.02); }
    .login-input { width: 100%; padding: 0.8rem; margin-bottom: 1rem; border-radius: 6px; border: 1px solid var(--border-color); background: rgba(255,255,255,0.03); color: var(--text-light); }
    .login-btn { width: 100%; padding: 0.8rem; background: var(--primary-accent); border: none; color: #000; border-radius: 6px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <h2 style="color:var(--primary-accent);">Admin Login</h2>
    <p style="opacity:0.8;">Sign in to manage the site</p>
    <label>Username</label>
    <input id="username" class="login-input" value="admin" />
    <label>Password</label>
    <input id="password" class="login-input" type="password" />
    <button id="loginBtn" class="login-btn">Sign In</button>
    <p style="margin-top:0.5rem;"><a href="#" id="forgotLink" style="color:var(--primary-accent);">Forgot password?</a></p>
    <p id="loginMsg" style="margin-top:1rem; opacity:0.8;"></p>
  </div>

  <script>
    const API_BASE_URL = "https://hollyhubdigitals.vercel.app";
    
    document.getElementById('loginBtn').addEventListener('click', async function(){
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      const res = await fetch(`${API_BASE_URL}/api/admin/login`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username:user,password:pass}) });
      if(res.ok){ const j=await res.json(); localStorage.setItem('adminToken', j.token); window.location.href = 'admin.html'; }
      else { const txt = await res.text(); document.getElementById('loginMsg').textContent = 'Login failed: ' + txt; }
    });

    // Forgot password flow
    const forgotLink = document.getElementById('forgotLink');
    forgotLink.addEventListener('click', function(e){
      e.preventDefault();
      if(document.getElementById('forgotModal')){ document.getElementById('forgotModal').style.display = 'flex'; return; }
      const modal = document.createElement('div');
      modal.id = 'forgotModal';
      modal.style = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:4000;';
      modal.innerHTML = `
        <div style="background:#fff;padding:1.25rem;border-radius:10px;max-width:420px;width:100%;">
          <h3 style="margin-top:0;margin-bottom:0.5rem">Reset admin password</h3>
          <p style="margin-top:0;margin-bottom:0.75rem;opacity:0.85">Enter your admin username or email to receive a reset token.</p>
          <input id="forgotInput" placeholder="username or email" style="width:100%;padding:0.6rem;margin-bottom:0.75rem;border:1px solid #ddd;border-radius:6px;" />
          <div style="display:flex;gap:0.5rem;justify-content:flex-end;">
            <button id="forgotCancel" class="login-btn" style="background:#eee;color:#000;padding:0.5rem 0.75rem;border-radius:6px;">Cancel</button>
            <button id="forgotSend" class="login-btn" style="padding:0.5rem 0.75rem;border-radius:6px;">Send reset link</button>
          </div>
          <div id="forgotMsg" style="margin-top:0.75rem;opacity:0.9"></div>
        </div>`;
      document.body.appendChild(modal);
      document.getElementById('forgotCancel').addEventListener('click', ()=>{ document.getElementById('forgotModal').style.display='none'; });
      document.getElementById('forgotSend').addEventListener('click', async ()=>{
        const v = document.getElementById('forgotInput').value.trim();
        if(!v) return document.getElementById('forgotMsg').textContent = 'Please enter username or email';
        document.getElementById('forgotMsg').textContent = 'Sending...';
        try{
          const payload = (v.indexOf('@')!==-1) ? { email: v } : { username: v };
          const r = await fetch(`${API_BASE_URL}/api/admin/reset-request`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
          const j = await r.json();
          if(!r.ok) return document.getElementById('forgotMsg').textContent = (j && j.error) ? j.error : 'Request failed';
          if(j.resetToken){
            document.getElementById('forgotMsg').innerHTML = `Reset token:<br/><code style="word-break:break-all;background:#f6f8fa;padding:0.5rem;border-radius:6px;display:block;margin-top:0.5rem">${j.resetToken}</code><div style="margin-top:0.5rem"><button id=\"forgotCopy\" class=\"login-btn\" style=\"padding:0.35rem 0.6rem;border-radius:6px;font-size:0.9rem\">Copy token</button></div>`;
            document.getElementById('forgotCopy').addEventListener('click', ()=>{ navigator.clipboard.writeText(j.resetToken); document.getElementById('forgotMsg').textContent = 'Token copied to clipboard'; });
          } else if (j.resetUrl){
            document.getElementById('forgotMsg').innerHTML = `Reset link: <a href="${j.resetUrl}" target="_blank">Open reset page</a>`;
          } else {
            document.getElementById('forgotMsg').textContent = 'If the account exists, a reset link has been sent.';
          }
        }catch(err){ document.getElementById('forgotMsg').textContent = 'Request failed'; }
      });
    });
  </script>
</body>
</html>
