# This file is no longer used - visitors site is now deployed on Vercel
# See DEPLOYMENT_GUIDE.md for current deployment instructions
services:
  - type: web
    name: holly-visitors
    env: node
    plan: free
    branch: main
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Add other env vars (S3, ADMIN credentials, Sentry) via Render dashboard
